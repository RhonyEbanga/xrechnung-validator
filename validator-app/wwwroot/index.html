<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRechnung Validator</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .upload-box {
            background: white;
            padding: 24px;
            border-radius: 8px;
            border: 2px dashed #ccc;
            margin: 20px 0;
        }
        button {
            padding: 10px 24px;
            cursor: pointer;
            border: none;
            background: #0d6efd;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 12px;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        #download-btn {
            display: none;
            background: #198754;
            margin-left: 8px;
        }
        .result-box {
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .valid {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .invalid {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #343a40;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:last-child td {
            border-bottom: none;
        }
        #steps-section {
            display: none;
        }
    </style>
</head>
<body>
    <h1>XRechnung Validator</h1>
    <p>Lade eine XRechnung XML Datei hoch und starte die Validierung.</p>

    <div class="upload-box">
        <input type="file" id="file-input" accept=".xml">
        <br>
        <button id="validate-btn" onclick="validate()">
            Validierung starten
        </button>
        <button id="download-btn" onclick="downloadReport()">
            Report herunterladen
        </button>
    </div>

    <div id="result-box" class="result-box"></div>

    <div id="summary-section" style="display:none">
    <h3>Validierungszusammenfassung</h3>
    <table>
        <thead>
            <tr>
                <th>Bereich</th>
                <th>Status</th>
                <th>Fehler</th>
                <th>Warnungen</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Syntaxschema</strong></td>
                <td id="syntax-status">-</td>
                <td id="syntax-errors">-</td>
                <td id="syntax-warnings">-</td>
            </tr>
            <tr>
                <td><strong>EN 16931 Rules</strong></td>
                <td id="en16931-status">-</td>
                <td id="en16931-errors">-</td>
                <td id="en16931-warnings">-</td>
            </tr>
            <tr>
                <td><strong>XRechnung Rules</strong></td>
                <td id="xrechnung-status">-</td>
                <td id="xrechnung-errors">-</td>
                <td id="xrechnung-warnings">-</td>
            </tr>
        </tbody>
    </table>
</div>
    <div id="steps-section">
        <h3>Validierungsschritte</h3>
        <table>
            <thead>
                <tr>
                    <th>Schritt</th>
                    <th>Status</th>
                    <th>Fehler</th>
                    <th>Warnungen</th>
                </tr>
            </thead>
            <tbody id="steps-body"></tbody>
        </table>
    </div>

    <script>
        let reportXml = null;

        async function validate() {
            const file = document.getElementById('file-input').files[0];
            if (!file) {
                alert('Bitte eine XML Datei auswählen!');
                return;
            }

            const btn = document.getElementById('validate-btn');
            btn.disabled = true;
            btn.textContent = 'Wird geprüft...';

            const formData = new FormData();
            formData.append('file', file);

            try {
    const response = await fetch('/api/validation/validate', {
        method: 'POST',
        body: formData
    });

    const data = await response.json();

    if (!response.ok) {
        alert('Fehler: ' + (data.message || 'Unbekannter Fehler'));
        return;
    }

    reportXml = data.reportXml;
    fillSummary(data.result);

    const resultBox = document.getElementById('result-box');
    resultBox.style.display = 'block';

    if (data.result.isValid) {
        resultBox.className = 'result-box valid';
        resultBox.textContent = '✓ Rechnung ist gültig!';
    } else {
        resultBox.className = 'result-box invalid';
        resultBox.textContent = '✗ Validierung fehlgeschlagen!';
    }

    const tbody = document.getElementById('steps-body');
    tbody.innerHTML = data.result.steps.map(step => `
        <tr>
            <td>${step.name}</td>
            <td>${step.valid ? '✓ OK' : '✗ Fehler'}</td>
            <td>${step.errors}</td>
            <td>${step.warnings}</td>
        </tr>
    `).join('');

    document.getElementById('steps-section').style.display = 'block';
    document.getElementById('download-btn').style.display = 'inline-block';

} catch (error) {
    alert('Fehler bei der Validierung: ' + error.message);
}

            btn.disabled = false;
            btn.textContent = 'Validierung starten';
        }

        function fillSummary(result) {
    const steps = [
        { 
            step: result.syntaxStep, 
            status: 'syntax-status', 
            errors: 'syntax-errors', 
            warnings: 'syntax-warnings' 
        },
        { 
            step: result.en16931Step, 
            status: 'en16931-status', 
            errors: 'en16931-errors', 
            warnings: 'en16931-warnings' 
        },
        { 
            step: result.xrechnungStep, 
            status: 'xrechnung-status', 
            errors: 'xrechnung-errors', 
            warnings: 'xrechnung-warnings' 
        }
    ];

    steps.forEach(item => {
        if (item.step) {
            document.getElementById(item.status).textContent = 
                item.step.valid ? '✓ OK' : '✗ Fehler';
            document.getElementById(item.errors).textContent = 
                item.step.errors;
            document.getElementById(item.warnings).textContent = 
                item.step.warnings;
        } else {
            document.getElementById(item.status).textContent = 
                'Nicht geprüft';
        }
    });

    document.getElementById('summary-section').style.display = 'block';
}

        function downloadReport() {
            if (!reportXml) return;
            const blob = new Blob([reportXml], { type: 'application/xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'validation-report.xml';
            a.click();
        }
    </script>
</body>
</html>
